<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Bridge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: { primary: 'var(--bg-primary)', secondary: 'var(--bg-secondary)', tertiary: 'var(--bg-tertiary)', card: 'var(--bg-card)', hover: 'var(--bg-hover)' },
            border: { DEFAULT: 'var(--border)', subtle: 'var(--border-subtle)' },
            accent: { DEFAULT: 'var(--accent)', hover: 'var(--accent-hover)', muted: 'var(--accent-muted)' },
            text: { primary: 'var(--text-primary)', secondary: 'var(--text-secondary)', muted: 'var(--text-muted)', faint: 'var(--text-faint)' },
          },
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          },
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-bg-primary text-text-primary font-sans h-screen overflow-hidden antialiased">

  <!-- ── Top Bar ────────────────────────────────────── -->
  <header class="flex items-center justify-between px-4 h-12 bg-bg-secondary border-b border-border flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 7h18M3 12h18M3 17h18" />
        </svg>
        <span class="font-semibold text-sm tracking-tight">ChatGPT Bridge</span>
      </div>
      <span id="status-badge" class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-medium bg-red-500/15 text-red-400">
        <span class="w-1.5 h-1.5 rounded-full bg-red-400"></span>
        Disconnected
      </span>
    </div>
    <div class="flex items-center gap-1.5">
      <div id="user-switcher" class="hidden flex items-center gap-1.5 mr-2">
        <svg class="w-3.5 h-3.5 text-text-faint" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        <input type="password" id="api-key-input" placeholder="API key" class="w-28 px-2 py-1 bg-bg-primary border border-border rounded text-xs text-text-primary placeholder-text-faint focus:outline-none focus:border-accent transition-colors" title="Your API key (x-api-key header)" />
      </div>
      <button id="btn-theme" class="p-1.5 rounded-md hover:bg-bg-hover text-text-muted hover:text-text-primary transition-colors" title="Toggle theme">
        <svg id="icon-moon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        <svg id="icon-sun" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
      </button>
      <button id="btn-refresh" class="p-1.5 rounded-md hover:bg-bg-hover text-text-muted hover:text-text-primary transition-colors" title="Refresh sessions">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0114.65-5.93M20 15a9 9 0 01-14.65 5.93" /></svg>
      </button>
      <button id="btn-new-chat" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-md bg-bg-tertiary hover:bg-bg-hover text-xs font-medium transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
        New Chat
      </button>
    </div>
  </header>

  <!-- ── Main Layout ────────────────────────────────── -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 min-w-72 bg-bg-secondary border-r border-border flex flex-col flex-shrink-0">
      <div class="p-3 border-b border-border">
        <div class="relative">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-text-faint" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" /></svg>
          <input type="text" id="session-search" placeholder="Search conversations" class="w-full pl-8 pr-3 py-2 bg-bg-primary border border-border rounded-md text-xs text-text-primary placeholder-text-faint focus:outline-none focus:border-accent transition-colors" />
        </div>
      </div>
      <div id="session-list" class="flex-1 overflow-y-auto px-2 py-2 space-y-0.5">
        <div class="text-center py-8 text-text-faint text-xs">Loading sessions...</div>
      </div>
      <div class="p-3 border-t border-border text-[10px] text-text-faint">
        <span id="session-count">0</span> sessions
      </div>
    </aside>

    <!-- Content -->
    <main class="flex-1 flex flex-col overflow-hidden bg-bg-primary">

      <!-- Chat Header (session info + tab switch) -->
      <div id="chat-header" class="flex items-center justify-between px-4 h-10 border-b border-border bg-bg-secondary flex-shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <h2 id="current-session-title" class="text-sm font-medium truncate text-text-secondary">Select a conversation</h2>
        </div>
        <div class="flex items-center gap-1">
          <button class="tab-btn active px-3 py-1 text-xs rounded-md transition-colors" data-tab="chat">Chat</button>
          <button class="tab-btn px-3 py-1 text-xs rounded-md transition-colors" data-tab="images">Images</button>
          <button class="tab-btn px-3 py-1 text-xs rounded-md transition-colors" data-tab="raw">Raw</button>
          <div class="w-px h-4 bg-border mx-1"></div>
          <button id="btn-copy-all" class="p-1.5 rounded-md hover:bg-bg-hover text-text-muted hover:text-text-primary transition-colors" title="Copy all">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
          </button>
          <button id="btn-export-md" class="p-1.5 rounded-md hover:bg-bg-hover text-text-muted hover:text-text-primary transition-colors" title="Export Markdown">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3" /></svg>
          </button>
        </div>
      </div>

      <!-- Chat Tab -->
      <div id="tab-chat" class="tab-content flex-1 flex flex-col overflow-hidden">
        <div id="messages" class="flex-1 overflow-y-auto">
          <div class="flex flex-col items-center justify-center h-full text-center px-6">
            <div class="w-12 h-12 rounded-full bg-accent-muted flex items-center justify-center mb-4">
              <svg class="w-6 h-6 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h8M8 14h5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <h3 class="text-base font-medium text-text-secondary mb-1">No conversation selected</h3>
            <p class="text-sm text-text-faint">Pick one from the sidebar or start a new chat</p>
          </div>
        </div>
      </div>

      <!-- Images Tab -->
      <div id="tab-images" class="tab-content hidden flex-1 overflow-y-auto p-4">
        <div id="images-grid" class="grid grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-4">
          <div class="col-span-full text-center py-16 text-text-faint text-sm">No images in this session</div>
        </div>
      </div>

      <!-- Raw Tab -->
      <div id="tab-raw" class="tab-content hidden flex-1 overflow-y-auto p-4">
        <pre id="raw-content" class="font-mono text-xs text-text-secondary whitespace-pre-wrap leading-relaxed">Select a session to view raw content</pre>
      </div>

      <!-- ── Composer ──────────────────────────────── -->
      <div class="border-t border-border bg-bg-secondary flex-shrink-0">

        <!-- Mode toggle + agent config -->
        <div class="flex items-center gap-2 px-4 pt-2.5">
          <div class="flex bg-bg-primary rounded-md border border-border p-0.5">
            <button id="mode-chat" class="mode-btn active px-3 py-1 text-xs rounded transition-colors">Chat</button>
            <button id="mode-agent" class="mode-btn px-3 py-1 text-xs rounded transition-colors">Agent</button>
          </div>

          <!-- Model selector -->
          <select id="model-select" class="px-2 py-1 bg-bg-primary border border-border rounded text-xs text-text-primary focus:outline-none focus:border-accent transition-colors cursor-pointer" title="Select ChatGPT model">
            <option value="">Default model</option>
          </select>

          <!-- Agent config (hidden in chat mode) -->
          <div id="agent-config" class="hidden flex items-center gap-2 flex-1">
            <input type="text" id="repo-path" placeholder="/path/to/repo" class="flex-1 px-2.5 py-1 bg-bg-primary border border-border rounded text-xs font-mono text-text-primary placeholder-text-faint focus:outline-none focus:border-accent transition-colors" />
            <label class="flex items-center gap-1.5 text-xs text-text-muted cursor-pointer select-none">
              <input type="checkbox" id="repo-context-toggle" class="accent-accent w-3.5 h-3.5 rounded" />
              <span>Inject repo context</span>
            </label>
          </div>

          <div id="thinking-indicator" class="hidden flex items-center gap-1.5 text-xs text-accent">
            <div class="w-3 h-3 border-2 border-accent border-t-transparent rounded-full animate-spin"></div>
            <span id="thinking-text">Thinking...</span>
          </div>
        </div>

        <!-- Prompt input -->
        <div class="flex items-end gap-2 p-3">
          <textarea id="prompt-input" placeholder="Send a message to ChatGPT..." rows="1" class="flex-1 px-3 py-2 bg-bg-primary border border-border rounded-lg text-sm text-text-primary placeholder-text-faint resize-none outline-none focus:border-accent transition-colors max-h-40 overflow-y-auto leading-relaxed"></textarea>
          <button id="btn-send" class="flex items-center justify-center w-9 h-9 rounded-lg bg-accent hover:bg-accent-hover text-white transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0" disabled>
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5M5 12l7-7 7 7" /></svg>
          </button>
        </div>
        <div class="px-4 pb-2 text-[10px] text-text-faint">
          <kbd class="px-1 py-0.5 bg-bg-tertiary rounded text-text-muted">Enter</kbd> to send ·
          <kbd class="px-1 py-0.5 bg-bg-tertiary rounded text-text-muted">Shift+Enter</kbd> for newline
        </div>
      </div>
    </main>
  </div>

  <!-- ── Image Modal ────────────────────────────────── -->
  <div id="image-modal" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-6" onclick="if(event.target===this)closeModal()">
    <div class="relative max-w-[90vw] max-h-[90vh]">
      <button onclick="closeModal()" class="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-bg-tertiary hover:bg-bg-hover border border-border flex items-center justify-center text-text-secondary transition-colors z-10">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
      <img id="modal-image" src="" alt="" class="max-w-full max-h-[85vh] rounded-lg" />
      <div class="flex gap-2 mt-3 justify-center">
        <button onclick="copyImage()" class="px-3 py-1.5 bg-bg-tertiary hover:bg-bg-hover rounded-md text-xs transition-colors">Copy</button>
        <button onclick="downloadImage()" class="px-3 py-1.5 bg-bg-tertiary hover:bg-bg-hover rounded-md text-xs transition-colors">Download</button>
        <button onclick="copyImageUrl()" class="px-3 py-1.5 bg-bg-tertiary hover:bg-bg-hover rounded-md text-xs transition-colors">Copy URL</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────── -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-[60] flex flex-col gap-2"></div>

  <script src="app.js"></script>
</body>
</html>
